version: '3'

vars:
  APP_NAME: Crack
  BUNDLE_ID: com.ronreiter.crack
  TEAM_ID: 8BKF8DY7Y4
  SIGN_IDENTITY: "Developer ID Application"
  VERSION:
    sh: /usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" Crack/Info.plist
  BUILD_DIR: build
  APP_PATH: "{{.BUILD_DIR}}/{{.APP_NAME}}.app"
  DMG_PATH: "{{.BUILD_DIR}}/{{.APP_NAME}}-{{.VERSION}}-arm64.dmg"
  ZIP_PATH: "{{.BUILD_DIR}}/{{.APP_NAME}}-{{.VERSION}}-arm64.zip"

env:
  APPLE_API_KEY_ID: 2ZR5277S92
  APPLE_API_ISSUER: afb89f06-eb3e-4054-a8a4-fc134c6ae859
  APPLE_API_KEY: "{{.HOME}}/private_keys/AuthKey_2ZR5277S92.p8"

tasks:
  default:
    silent: true
    cmds:
      - /opt/homebrew/bin/task --list

  clean:
    desc: Remove build artifacts
    cmds:
      - /bin/rm -rf {{.BUILD_DIR}}
      - /usr/bin/xcodebuild -project {{.APP_NAME}}.xcodeproj -scheme {{.APP_NAME}} clean

  build:
    desc: Build the app in Release mode
    cmds:
      - /bin/mkdir -p {{.BUILD_DIR}}
      - /usr/bin/xcodebuild -project {{.APP_NAME}}.xcodeproj -scheme {{.APP_NAME}} -configuration Release build
      - /bin/rm -rf {{.APP_PATH}}
      - /bin/cp -R ~/Library/Developer/Xcode/DerivedData/Crack-*/Build/Products/Release/{{.APP_NAME}}.app {{.APP_PATH}}

  sign:
    desc: Code sign the app with Developer ID
    deps: [build]
    cmds:
      - /usr/bin/codesign --deep --force --options runtime --sign "{{.SIGN_IDENTITY}}" --timestamp {{.APP_PATH}}
      - /usr/bin/codesign --verify --verbose {{.APP_PATH}}

  notarize:
    desc: Notarize the app with Apple
    deps: [sign]
    cmds:
      - /usr/bin/ditto -c -k --keepParent {{.APP_PATH}} {{.ZIP_PATH}}
      - /usr/bin/xcrun notarytool submit {{.ZIP_PATH}} --key "$APPLE_API_KEY" --key-id "$APPLE_API_KEY_ID" --issuer "$APPLE_API_ISSUER" --wait
      - /usr/bin/xcrun stapler staple {{.APP_PATH}}

  dmg:
    desc: Create a DMG for distribution
    deps: [notarize]
    cmds:
      - /bin/rm -f {{.DMG_PATH}}
      - /usr/bin/hdiutil create -volname "{{.APP_NAME}}" -srcfolder {{.APP_PATH}} -ov -format UDZO {{.DMG_PATH}}
      - /usr/bin/codesign --sign "{{.SIGN_IDENTITY}}" --timestamp {{.DMG_PATH}}

  package:
    desc: Build, sign, notarize, and create DMG
    deps: [dmg]

  release:
    desc: Create a GitHub release with the DMG
    deps: [package]
    cmds:
      - /opt/homebrew/bin/gh release create v{{.VERSION}} --title "{{.APP_NAME}} v{{.VERSION}}" --generate-notes {{.DMG_PATH}}

  install:
    desc: Build and install to /Applications
    deps: [build]
    cmds:
      - /bin/rm -rf /Applications/{{.APP_NAME}}.app
      - /bin/cp -R {{.APP_PATH}} /Applications/{{.APP_NAME}}.app

  run:
    desc: Build, install, and run
    deps: [install]
    cmds:
      - /usr/bin/open /Applications/{{.APP_NAME}}.app
